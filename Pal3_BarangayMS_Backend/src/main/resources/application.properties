spring.application.name=bms_backend

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Database — values supplied via Railway environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Mail — values supplied via Railway environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT — values supplied via Railway environment variables
jwt.secret=${JWT_SECRET}
jwt.access.exp=900000
jwt.refresh.exp=604800000

# SMS
semaphore.api.url=https://api.semaphore.co/api/v4/messages
semaphore.api.key=${SEMAPHORE_API_KEY}

# Railway port binding
server.port=${PORT:8080}
server.address=0.0.0.0
